# Nginx reverse proxy for aistra-stream
# Usage: copy to /etc/nginx/sites-available/aistra-stream, symlink, reload nginx
#
# For SSL, run: certbot --nginx -d yourdomain.com
# Replace YOUR_DOMAIN below with your actual domain.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Redirect HTTP → HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # HLS — no buffering for playlists and segments
        proxy_buffering    off;
        proxy_cache        off;

        # SSE (live log) — disable buffering
        proxy_read_timeout 3600s;
    }
}

